{% extends "base.html" %}

{% block content %}
<h2 class="page-title">Журнал действий</h2>

<form method="get" class="card p-4 mb-4 filter-card">
    <div class="row g-3 align-items-end">
        <div class="col-lg-7 col-md-12">
            <label>Тип события</label>
            <select name="action_type" class="form-select">
                <option value="">Все события</option>

                {% for item in ["Создание клиента", "Изменение клиента", "Создание заявки", "Изменение заявки", "Создание задачи", "Изменение задачи", "Выполнение задачи", "Создание договора", "Изменение договора", "Загрузка документа", "Создание акта", "Создание объекта", "Изменение объекта"] %}
                    <option value="{{ item }}" {% if action_type == item %}selected{% endif %}>
                        {{ item }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-lg-3 col-md-6">
        </div>

        <div class="col-lg-2 col-md-6">
            <button class="btn btn-primary filter-btn" type="submit">
                Показать
            </button>
        </div>
    </div>
</form>

<div class="card p-4">
    {% for log in logs %}
        <div class="activity-item">
            <div class="activity-dot"></div>

            <div>
                <b>{{ log.action_type }}</b>

                <p>{{ log.description }}</p>

                <span>
                    {{ log.created_at.strftime("%d.%m.%Y %H:%M") if log.created_at else "—" }}
                </span>
            </div>
        </div>
    {% else %}
        <p>Журнал действий пока пуст.</p>
    {% endfor %}
</div>
{% endblock %}
